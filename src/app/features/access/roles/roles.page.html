<div class="flex flex-col h-full lg:h-[calc(100vh-96px)] lg:overflow-hidden gap-3 pb-4">
  <!-- Page Header -->
  <div class="flex items-center justify-between shrink-0">
    <div class="flex flex-col gap-0.5">
      <h1 class="page-title">Roles</h1>
      <p class="page-subtitle">Define administrative roles and their access scope.</p>
    </div>
    <button
      (click)="openCreate()"
      class="btn-primary h-8.5 px-3.5 text-[12px] rounded-xl gap-1.5 shadow-md shadow-brand-500/10 hover:shadow-brand-500/25 transition-all cursor-pointer font-semibold"
      title="Add Role"
    >
      <!-- Plus Icon -->
      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      Create Role
    </button>
  </div>

  <!-- Data Table (fills remaining space) -->
  <app-data-table
    [columns]="columns"
    [rows]="rows()"
    [loading]="loading()"
    emptyText="No roles yet. Create your first role."
    searchPlaceholder="Search roles…"
    [actions]="actionsTpl"
    [fillHeight]="true"
    class="flex-1 min-h-0 flex flex-col"
  />

  <!-- Action Column Buttons -->
  <ng-template #actionsTpl let-row>
    <div class="flex justify-end gap-1.5">
      <button
        (click)="openEdit(row)"
        (mouseenter)="tooltip.show($event, 'Edit Role', { info: 'Modify permissions and administrative settings for this role.', placement: 'left' })"
        (mouseleave)="tooltip.hide()"
        class="flex h-7.5 w-7.5 items-center justify-center rounded-lg text-brand-600 hover:bg-brand-50 hover:text-brand-800 transition-all cursor-pointer"
      >
        <!-- Pencil Icon -->
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
        </svg>
      </button>
      <button
        (click)="remove(row)"
        (mouseenter)="tooltip.show($event, 'Delete Role', { info: 'Remove this role and disassociate assigned accounts.', placement: 'left' })"
        (mouseleave)="tooltip.hide()"
        class="flex h-7.5 w-7.5 items-center justify-center rounded-lg text-red-500 hover:bg-red-50 hover:text-red-700 transition-all cursor-pointer"
      >
        <!-- Trash Icon -->
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </div>
  </ng-template>

  <!-- Create/Edit Modal -->
  @if (modalOpen()) {
    <app-modal
      [title]="editingId() ? 'Edit Role details' : 'Create New Role'"
      (close)="modalOpen.set(false)"
    >
      <form [formGroup]="form" (ngSubmit)="save()" class="space-y-5">
        <!-- Role Name -->
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">Role Name</label>
          <input
            formControlName="RoleName"
            placeholder="e.g. Sales Manager"
            class="w-full !px-3.5 !py-1.5 border border-slate-200 !rounded-xl focus:border-brand-600 focus:!ring-4 focus:!ring-brand-500/10 placeholder:text-slate-400 bg-slate-50/50 hover:bg-slate-50 transition-all text-[13.5px] h-9.5"
            [class.!border-red-500]="form.controls.RoleName.touched && form.controls.RoleName.invalid"
          />
          @if (form.controls.RoleName.touched && form.controls.RoleName.invalid) {
            <p class="text-[11px] text-red-500 font-semibold flex items-center gap-1 mt-0.5">Required</p>
          }
        </div>

        <!-- Description -->
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">Description</label>
          <textarea
            formControlName="Description"
            rows="3"
            placeholder="Describe what tasks and areas this role can access..."
            class="w-full !px-3.5 !py-2 border border-slate-200 !rounded-xl focus:border-brand-600 focus:!ring-4 focus:!ring-brand-500/10 placeholder:text-slate-400 bg-slate-50/50 hover:bg-slate-50 transition-all text-[13.5px]"
          ></textarea>
        </div>

        <!-- Active Switch Status -->
        <div class="pt-1">
          <label class="flex w-fit items-center gap-3 cursor-pointer select-none group">
            <input
              type="checkbox"
              formControlName="IsActive"
              class="h-4.5 w-4.5 rounded-md border-slate-300 text-brand-600 focus:ring-brand-600/20 focus:ring-offset-0 transition-colors cursor-pointer"
            />
            <span class="text-[13.5px] font-semibold text-slate-700 group-hover:text-slate-900 transition-colors">Role active and assignable</span>
          </label>
        </div>
      </form>

      <!-- Footer Action Buttons -->
      <div footer class="flex justify-end gap-2.5">
        <button (click)="modalOpen.set(false)" class="btn-secondary h-9 rounded-xl px-4 cursor-pointer text-[13px] font-semibold">
          Cancel
        </button>
        <button
          (click)="save()"
          [disabled]="saving()"
          class="btn-primary h-9 rounded-xl px-4 min-w-[80px] cursor-pointer text-[13px] font-semibold shadow-md shadow-brand-500/10 hover:shadow-brand-500/20 flex items-center justify-center gap-1.5"
        >
          @if (saving()) {
            <svg class="h-4 w-4 animate-spin text-white" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Saving…
          } @else {
            Save
          }
        </button>
      </div>
    </app-modal>
  }
</div>
