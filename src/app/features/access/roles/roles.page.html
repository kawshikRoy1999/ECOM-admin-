<div class="space-y-4">
  <div class="flex items-center justify-between">
    <div class="flex flex-col gap-0.5">
      <h1 class="page-title">Roles</h1>
      <p class="page-subtitle">Define administrative roles and their access scope.</p>
    </div>
    <button (click)="openCreate()" class="flex h-8 w-8 items-center justify-center rounded-md bg-brand-600 text-white hover:bg-brand-700 active:scale-[0.98] transition-all shadow-sm" title="Add Role">
      <svg class="h-4 w-4 fill-current" viewBox="0 0 20 20">
        <path d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" />
      </svg>
    </button>
  </div>

  <app-data-table
    [columns]="columns"
    [rows]="rows()"
    [loading]="loading()"
    emptyText="No roles yet. Create your first role."
    searchPlaceholder="Search roles…"
    [actions]="actionsTpl"
  />

  <ng-template #actionsTpl let-row>
    <div class="flex justify-end gap-1">
      <button (click)="openEdit(row)" class="flex h-7 w-7 items-center justify-center rounded text-brand-600 hover:bg-brand-50 transition-colors" title="Edit Role">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
        </svg>
      </button>
      <button (click)="remove(row)" class="flex h-7 w-7 items-center justify-center rounded text-red-600 hover:bg-red-50 transition-colors" title="Delete Role">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </div>
  </ng-template>

  @if (modalOpen()) {
    <app-modal [title]="editingId() ? 'Edit Role' : 'New Role'" (close)="modalOpen.set(false)">
      <form [formGroup]="form" (ngSubmit)="save()" class="space-y-4">
        <div class="flex flex-col gap-1">
          <label class="text-[12px] font-bold text-slate-500 uppercase tracking-tight">Role Name</label>
          <input formControlName="RoleName" placeholder="e.g. Sales Manager" class="h-8" />
          @if (form.controls.RoleName.touched && form.controls.RoleName.invalid) {
            <p class="text-[11px] text-red-600">Required</p>
          }
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[12px] font-bold text-slate-500 uppercase tracking-tight">Description</label>
          <textarea formControlName="Description" rows="2" placeholder="Describe what this role can do..." class="text-[13px]"></textarea>
        </div>
        <div class="pt-1">
          <label class="flex w-fit items-center gap-2.5 cursor-pointer select-none group">
            <input type="checkbox" formControlName="IsActive" class="h-4 w-4 rounded border-slate-300 text-brand-600 focus:ring-brand-600/20 transition-colors" />
            <span class="text-[13px] font-medium text-slate-700 group-hover:text-black">Role active and assignable</span>
          </label>
        </div>
      </form>

      <div footer class="flex justify-end gap-2">
        <button (click)="modalOpen.set(false)" class="btn-secondary h-8">
          Cancel
        </button>
        <button (click)="save()" [disabled]="saving()" class="btn-primary h-8 min-w-[70px]">
          @if (saving()) {
            <svg class="mr-1.5 h-3 w-3 animate-spin text-white" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Saving
          } @else {
            Save
          }
        </button>
      </div>
    </app-modal>
  }
</div>
