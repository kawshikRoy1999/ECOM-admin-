@if (loading()) {
  <div class="flex h-[300px] items-center justify-center">
    <div class="flex flex-col items-center gap-3">
      <svg class="h-8 w-8 animate-spin text-brand-600" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="text-sm font-medium text-slate-500">Loading document template…</p>
    </div>
  </div>
} @else {
  <div class="h-auto lg:h-full lg:overflow-hidden">
    <!-- EDITOR PANEL -->
    <div class="flex flex-col h-auto lg:h-full bg-white rounded-xl border border-slate-200 overflow-hidden shadow-xs">
      <!-- Editor Header -->
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 px-4 py-2.5 bg-slate-50/70 border-b border-slate-200/80">
        <!-- Toggle Tabs -->
        <div class="flex items-center gap-1 rounded-lg bg-slate-200/60 p-0.5 w-full md:w-auto">
          <button
            type="button"
            (click)="setMode('visual')"
            class="flex-1 md:flex-none flex items-center justify-center gap-1.5 px-3 py-1 text-[12px] font-bold rounded-md transition-all cursor-pointer"
            [class.bg-white]="editorMode() === 'visual'"
            [class.text-slate-800]="editorMode() === 'visual'"
            [class.shadow-xs]="editorMode() === 'visual'"
            [class.text-slate-500]="editorMode() !== 'visual'"
            [class.hover:text-slate-800]="editorMode() !== 'visual'"
          >
            <!-- Visual Icon -->
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            Visual Editor
          </button>
          <button
            type="button"
            (click)="setMode('code')"
            class="flex-1 md:flex-none flex items-center justify-center gap-1.5 px-3 py-1 text-[12px] font-bold rounded-md transition-all cursor-pointer"
            [class.bg-white]="editorMode() === 'code'"
            [class.text-slate-800]="editorMode() === 'code'"
            [class.shadow-xs]="editorMode() === 'code'"
            [class.text-slate-500]="editorMode() !== 'code'"
            [class.hover:text-slate-800]="editorMode() !== 'code'"
          >
            <!-- Code Icon -->
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
            </svg>
            HTML Source
          </button>
        </div>

        <div class="flex items-center gap-2 w-full md:w-auto justify-end">
        <!-- Preview Button -->
        <button
          type="button"
          (click)="previewOpen.set(true)"
          class="btn-secondary h-8 px-3.5 text-[12px] gap-1.5 cursor-pointer shadow-sm whitespace-nowrap flex items-center"
          title="Preview Document Template"
        >
          <!-- Eye Icon -->
          <svg class="h-4 w-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
          Preview
        </button>

        <!-- Save Button -->
        <button
          (click)="save()"
          [disabled]="saving()"
          class="btn-primary h-8 px-4 text-[12px] gap-1.5 cursor-pointer shadow-sm whitespace-nowrap flex items-center"
        >
          @if (saving()) {
            <svg class="h-3 w-3 animate-spin text-white" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Saving…
          } @else {
            <!-- Save Icon -->
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
            </svg>
            Save
          }
        </button>
      </div>
    </div>

      <!-- Formatting Toolbar (WYSIWYG Only) -->
      @if (editorMode() === 'visual') {
        <div class="flex flex-wrap items-center gap-1.5 p-2 bg-slate-50/50 border-b border-slate-200/80">
          <!-- Text Styling Group -->
          <div class="flex items-center gap-0.5 border-r border-slate-200 pr-1.5">
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('bold')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Bold"
            >
              <span class="font-bold text-[13px]">B</span>
            </button>
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('italic')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Italic"
            >
              <span class="italic font-serif text-[13px]">I</span>
            </button>
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('underline')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Underline"
            >
              <span class="underline text-[13px]">U</span>
            </button>
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('strikeThrough')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Strikethrough"
            >
              <span class="line-through text-[13px]">S</span>
            </button>
          </div>

          <!-- Alignment Group -->
          <div class="flex items-center gap-0.5 border-r border-slate-200 pr-1.5">
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('justifyLeft')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Align Left"
            >
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h10M4 18h16" />
              </svg>
            </button>
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('justifyCenter')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Align Center"
            >
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M7 12h10M4 18h16" />
              </svg>
            </button>
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('justifyRight')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Align Right"
            >
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M10 12h10M4 18h16" />
              </svg>
            </button>
          </div>

          <!-- Lists Group -->
          <div class="flex items-center gap-0.5 border-r border-slate-200 pr-1.5">
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('insertUnorderedList')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Bullet List"
            >
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16M4 6h.01M4 12h.01M4 18h.01" />
              </svg>
            </button>
            <button
              type="button"
              (mousedown)="$event.preventDefault()"
              (click)="execCmd('insertOrderedList')"
              class="h-7 w-7 flex items-center justify-center rounded text-slate-600 hover:bg-slate-200/60 hover:text-slate-800 transition-colors cursor-pointer"
              title="Numbered List"
            >
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 6h13M7 12h13M7 18h13M3 6h1v1m0 0h1m-1 0H3m2 6v1H3m2 0H3m3 5H4v1M3 17h3" />
              </svg>
            </button>
          </div>

          <!-- Block Formatting Select -->
          <div class="flex items-center gap-1 border-r border-slate-200 pr-1.5">
            <select
              (change)="execCmd('formatBlock', $any($event.target).value); $any($event.target).value = ''"
              class="h-7 text-[12px] font-semibold text-slate-600 bg-white border border-slate-200 rounded px-1.5 focus:outline-none focus:ring-1 focus:ring-brand-500/20 cursor-pointer"
              title="Text style"
            >
              <option value="" disabled selected>Style</option>
              <option value="p">Paragraph</option>
              <option value="h1">Heading 1</option>
              <option value="h2">Heading 2</option>
              <option value="h3">Heading 3</option>
              <option value="blockquote">Quote</option>
              <option value="pre">Code Block</option>
            </select>
          </div>

          <!-- Variables Selector -->
          <div class="flex items-center gap-1">
            <select
              (change)="insertVar($any($event.target).value); $any($event.target).value = ''"
              class="h-7 text-[12px] font-semibold text-brand-600 bg-brand-50 border border-brand-200/60 rounded px-1.5 focus:outline-none focus:ring-1 focus:ring-brand-500/20 cursor-pointer"
              title="Insert dynamic placeholder"
            >
              <option value="" disabled selected>+ Insert Placeholder</option>
              @for (p of placeholders(); track p.tag) {
                <option [value]="p.tag">{{ p.name }} ({{ '{{' + p.tag + '}}' }})</option>
              }
            </select>
          </div>

          <!-- Clear Formatting Button -->
          <button
            type="button"
            (mousedown)="$event.preventDefault()"
            (click)="execCmd('removeFormat')"
            class="h-7 px-1.5 flex items-center justify-center gap-1 rounded text-slate-500 hover:bg-slate-200/60 hover:text-slate-700 transition-colors ml-auto cursor-pointer text-[11px] font-semibold"
            title="Clear formatting"
          >
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            Clear Formatting
          </button>
        </div>
      }

      <!-- Editor Content Canvas -->
      <div class="flex-1 overflow-auto bg-slate-100/40 p-2 sm:p-4">
        @if (editorMode() === 'visual') {
          <div
            #editorEl
            contenteditable="true"
            (input)="syncFromEditor()"
            class="min-h-[400px] sm:min-h-[500px] w-full max-w-[800px] mx-auto bg-white p-4 sm:p-8 md:p-12 shadow-sm border border-slate-200/60 rounded-sm focus:outline-none focus:ring-1 focus:ring-brand-500/20 text-slate-800 text-[14px] leading-relaxed prose prose-slate focus-within:shadow-md transition-shadow"
            placeholder="Document markup details..."
          ></div>
        } @else {
          <textarea
            [ngModel]="html()"
            (ngModelChange)="html.set($event)"
            spellcheck="false"
            class="w-full h-full min-h-[400px] sm:min-h-[500px] max-w-[800px] mx-auto block bg-slate-900 text-slate-200 p-4 sm:p-6 font-mono text-[13px] leading-relaxed resize-none border border-slate-800 rounded-sm focus:outline-none focus:ring-1 focus:ring-brand-500/20 shadow-inner"
            placeholder="<html>…your template HTML code…</html>"
          ></textarea>
        }
      </div>
    </div>
  </div>
}

<!-- PREVIEW MODAL -->
@if (previewOpen()) {
  <app-modal
    [title]="'Document Preview Proof'"
    widthClass="max-w-4xl"
    (close)="previewOpen.set(false)"
  >
    <!-- Preview Canvas Container -->
    <div class="overflow-y-auto max-h-[70vh] px-2 py-1 text-slate-800 text-[14px] leading-relaxed">
      <div [innerHTML]="preview()"></div>
    </div>

    <!-- Modal Footer -->
    <div footer class="flex justify-end">
      <button
        (click)="previewOpen.set(false)"
        class="btn-secondary h-9 rounded-xl px-4 cursor-pointer text-[13px] font-semibold"
      >
        Close Preview
      </button>
    </div>
  </app-modal>
}
