<app-modal [title]="itemVariantId() ? 'Edit Variant' : 'New Variant'" widthClass="max-w-3xl" (close)="close.emit()">
  @if (loading()) {
    <p class="py-10 text-center text-[13px] text-slate-400">Loading variant…</p>
  } @else if (model(); as m) {
    <div class="flex flex-col gap-4">
      <!-- Core fields -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">Variant Name <span class="text-red-500">*</span></label>
          <input [ngModel]="m.itemVariantName" (ngModelChange)="patch('itemVariantName', $event)"
            class="h-9 rounded-xl border border-slate-200 px-3 text-[13px] bg-slate-50/50" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">SKU</label>
          <input [ngModel]="m.sku" (ngModelChange)="patch('sku', $event)" class="h-9 rounded-xl border border-slate-200 px-3 text-[13px] bg-slate-50/50 font-mono" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">Barcode</label>
          <input [ngModel]="m.barcode" (ngModelChange)="patch('barcode', $event)" class="h-9 rounded-xl border border-slate-200 px-3 text-[13px] bg-slate-50/50 font-mono" />
        </div>
        @if (m.skuBarcodeImage) {
          <div class="sm:col-span-2 flex justify-center bg-slate-50/50 rounded-xl border border-slate-100 py-2">
            <img [src]="m.skuBarcodeImage" alt="barcode" class="h-14" />
          </div>
        }
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">Return Days</label>
          <input type="number" [ngModel]="m.returnDays" (ngModelChange)="patch('returnDays', $event)" class="h-9 rounded-xl border border-slate-200 px-3 text-[13px] bg-slate-50/50" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">Return Info</label>
          <input [ngModel]="m.returnInfo" (ngModelChange)="patch('returnInfo', $event)" class="h-9 rounded-xl border border-slate-200 px-3 text-[13px] bg-slate-50/50" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">MRP</label>
          <input type="number" [ngModel]="m.mrp" (ngModelChange)="patch('mrp', $event)" class="h-9 rounded-xl border border-slate-200 px-3 text-[13px] bg-slate-50/50" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-slate-700 uppercase tracking-wider">Discount</label>
          <input type="number" [ngModel]="m.discount" (ngModelChange)="patch('discount', $event)" class="h-9 rounded-xl border border-slate-200 px-3 text-[13px] bg-slate-50/50" />
        </div>
      </div>

      <!-- Pricing rows -->
      <div class="border-t border-slate-100 pt-3">
        <div class="flex items-center justify-between mb-2">
          <p class="text-[12px] font-bold text-slate-700 uppercase tracking-wider">Variant Pricing</p>
          <button (click)="addPricing()" class="btn-primary h-8 px-3 text-[12px] font-semibold rounded-lg gap-1">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
            Add Row
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full text-[12.5px]">
            <thead class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">
              <tr>
                <th class="px-2 py-1.5 text-left">MRP</th>
                <th class="px-2 py-1.5 text-left">Discount</th>
                <th class="px-2 py-1.5 text-left">Price</th>
                <th class="px-2 py-1.5 text-left">Cost</th>
                <th class="px-2 py-1.5 text-left">Batch</th>
                <th class="px-2 py-1.5 text-left">Start</th>
                <th class="px-2 py-1.5 text-left">End</th>
                <th class="px-2 py-1.5"></th>
              </tr>
            </thead>
            <tbody>
              @for (p of m.pricing; track $index) {
                <tr>
                  <td class="px-1 py-1"><input type="number" [ngModel]="p.mrp" (ngModelChange)="updatePricing($index,'mrp',$event)" class="h-8 w-20 rounded-lg border border-slate-200 px-2 bg-slate-50/50" /></td>
                  <td class="px-1 py-1"><input type="number" [ngModel]="p.discount" (ngModelChange)="updatePricing($index,'discount',$event)" class="h-8 w-20 rounded-lg border border-slate-200 px-2 bg-slate-50/50" /></td>
                  <td class="px-1 py-1"><input type="number" [ngModel]="p.price" (ngModelChange)="updatePricing($index,'price',$event)" class="h-8 w-20 rounded-lg border border-slate-200 px-2 bg-slate-50/50" /></td>
                  <td class="px-1 py-1"><input type="number" [ngModel]="p.cost" (ngModelChange)="updatePricing($index,'cost',$event)" class="h-8 w-20 rounded-lg border border-slate-200 px-2 bg-slate-50/50" /></td>
                  <td class="px-1 py-1"><input [ngModel]="p.batchCode" (ngModelChange)="updatePricing($index,'batchCode',$event)" class="h-8 w-24 rounded-lg border border-slate-200 px-2 bg-slate-50/50 font-mono" /></td>
                  <td class="px-1 py-1"><input type="date" [ngModel]="p.startDate" (ngModelChange)="updatePricing($index,'startDate',$event)" class="h-8 w-32 rounded-lg border border-slate-200 px-2 bg-slate-50/50" /></td>
                  <td class="px-1 py-1"><input type="date" [ngModel]="p.endDate" (ngModelChange)="updatePricing($index,'endDate',$event)" class="h-8 w-32 rounded-lg border border-slate-200 px-2 bg-slate-50/50" /></td>
                  <td class="px-1 py-1">
                    <button (click)="removePricing($index)" [disabled]="m.pricing.length <= 1" class="flex h-8 w-8 items-center justify-center rounded-lg text-red-500 hover:bg-red-50 disabled:opacity-30">
                      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  } @else {
    <p class="py-10 text-center text-[13px] text-slate-400">Could not load variant.</p>
  }

  <div footer class="flex justify-end gap-2">
    <button (click)="close.emit()" class="btn-secondary h-9 px-4 text-[12.5px] font-semibold rounded-xl">Cancel</button>
    <button (click)="save()" [disabled]="saving() || loading()" class="btn-primary h-9 px-5 text-[12.5px] font-semibold rounded-xl min-w-[90px] disabled:opacity-60">{{ saving() ? 'Saving…' : 'Save Variant' }}</button>
  </div>
</app-modal>
