<div class="min-h-screen bg-slate-50">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <div class="flex items-center gap-3">
        <span
          class="flex h-9 w-9 items-center justify-center rounded-lg bg-brand-600 text-sm font-bold text-white"
          >E</span
        >
        <span class="font-semibold text-slate-900">ECOM Admin</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-slate-600">{{ user()?.name || user()?.email }}</span>
        <button
          (click)="logout()"
          class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50"
        >
          Log out
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-6 py-12">
    <h1 class="text-2xl font-bold text-slate-900">Dashboard</h1>
    <p class="mt-2 text-slate-500">
      You're signed in. This is a placeholder — admin modules will be migrated here next.
    </p>
  </main>
</div>
