<div class="flex flex-col h-full lg:h-[calc(100vh-80px)] sm:lg:h-[calc(100vh-90px)] lg:h-[calc(100vh-96px)] overflow-y-auto lg:overflow-hidden gap-4 pb-4">
  <div class="flex flex-col gap-0.5 shrink-0">
    <h1 class="page-title">Orders</h1>
    <p class="page-subtitle">Review and manage customer orders.</p>
  </div>

  <div class="shrink-0">
    <app-tabs [tabs]="tabs" [active]="active()" (activeChange)="changeTab($event)" />
  </div>

  <!-- Filters Card -->
  <div class="fluent-card p-4 flex flex-col gap-4 shrink-0 relative z-20">
    <!-- Top Row: Section Label and Action Buttons -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 w-full shrink-0">
      <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Search Filters</span>
      
      <!-- Action Buttons (Right) -->
      <div class="flex items-center gap-2 shrink-0">
        <button
          (click)="showAdvanced.set(!showAdvanced())"
          class="btn-secondary h-9 px-3.5 text-[12px] font-bold flex items-center gap-1.5 cursor-pointer"
        >
          <svg class="h-3.5 w-3.5 text-slate-500 transition-transform duration-300" [class.rotate-180]="showAdvanced()" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
          Advanced
        </button>
        <button (click)="clearFilters()" class="btn-secondary h-9 px-4 text-[12px] font-bold cursor-pointer">Clear</button>
        <button (click)="applyFilters()" class="btn-primary h-9 px-4 text-[12px] font-bold flex items-center gap-1.5 shadow-md shadow-brand-500/10 hover:shadow-brand-500/25 cursor-pointer">
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          Apply
        </button>
      </div>
    </div>

    <!-- Divider line -->
    <div class="h-[1px] bg-slate-100/80 w-full shrink-0"></div>

    <!-- Bottom Row: Filter Inputs -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
      <!-- Customer Name -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Customer Name</label>
        <div class="relative flex items-center">
          <span class="absolute left-3.5 text-slate-400">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </span>
          <input
            [value]="cName()"
            (input)="cName.set($any($event.target).value)"
            placeholder="Search customer name..."
            class="w-full !pl-9.5 !pr-3.5 !py-1.5 border border-slate-200 !rounded-xl focus:border-brand-600 focus:!ring-4 focus:!ring-brand-500/10 placeholder:text-slate-400 bg-slate-50/50 hover:bg-slate-50 transition-all text-[12.5px] h-9"
          />
        </div>
      </div>

      <!-- Order Number -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Order Number</label>
        <div class="relative flex items-center">
          <span class="absolute left-3.5 text-slate-400">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
            </svg>
          </span>
          <input
            [value]="orderno()"
            (input)="orderno.set($any($event.target).value)"
            placeholder="Search order number..."
            class="w-full !pl-9.5 !pr-3.5 !py-1.5 border border-slate-200 !rounded-xl focus:border-brand-600 focus:!ring-4 focus:!ring-brand-500/10 placeholder:text-slate-400 bg-slate-50/50 hover:bg-slate-50 transition-all text-[12.5px] h-9"
          />
        </div>
      </div>
    </div>

    <!-- Advanced Filters Panel -->
    @if (showAdvanced()) {
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 pt-4 border-t border-slate-100/80 animate-fadeIn">
        <!-- Phone -->
        <div class="flex flex-col gap-1.5">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Phone</label>
          <div class="relative flex items-center">
            <span class="absolute left-3.5 text-slate-400">
              <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
              </svg>
            </span>
            <input
              [value]="custphone()"
              (input)="custphone.set($any($event.target).value)"
              placeholder="Customer phone..."
              class="w-full !pl-9.5 !pr-3.5 !py-1.5 border border-slate-200 !rounded-xl focus:border-brand-600 focus:!ring-4 focus:!ring-brand-500/10 placeholder:text-slate-400 bg-slate-50/50 hover:bg-slate-50 transition-all text-[12.5px] h-9"
            />
          </div>
        </div>

        <!-- PIN Code -->
        <div class="flex flex-col gap-1.5">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">PIN Code</label>
          <div class="relative flex items-center">
            <span class="absolute left-3.5 text-slate-400">
              <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </span>
            <input
              [value]="pinCode()"
              (input)="pinCode.set($any($event.target).value)"
              placeholder="PIN code..."
              class="w-full !pl-9.5 !pr-3.5 !py-1.5 border border-slate-200 !rounded-xl focus:border-brand-600 focus:!ring-4 focus:!ring-brand-500/10 placeholder:text-slate-400 bg-slate-50/50 hover:bg-slate-50 transition-all text-[12.5px] h-9"
            />
          </div>
        </div>

        <!-- Date Range -->
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Date Range</label>
          <app-date-range-picker
            [(startDate)]="fromDate"
            [(endDate)]="toDate"
            placeholder="Select date range"
          />
        </div>
      </div>
    }
  </div>

  <!-- Order-level tabs -->
  @if (isOrder()) {
    <div class="flex-1 flex flex-col min-h-0 gap-4">
      <app-data-table
        [columns]="columns"
        [rows]="rows()"
        [loading]="loading()"
        [searchable]="false"
        emptyText="No orders found."
        [actions]="orderActions"
        [fillHeight]="true"
      />
      <ng-template #orderActions let-row>
        <button (click)="open(row)"
                (mouseenter)="tooltip.show($event, 'View Details', { info: 'View full invoice details and workflow history.', placement: 'left' })"
                (mouseleave)="tooltip.hide()"
                class="flex h-7.5 w-7.5 items-center justify-center rounded-lg text-brand-600 hover:bg-brand-50 border border-slate-200/40 hover:border-brand-200/50 bg-white shadow-2xs hover:shadow-xs transition-all cursor-pointer"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </button>
      </ng-template>

      <div class="flex items-center justify-between py-1 shrink-0">
        <span class="text-[11.5px] font-bold text-slate-500 bg-slate-100/70 border border-slate-200/40 rounded-lg px-2.5 py-1 shrink-0">
          {{ totalRecords() }} orders
        </span>
        <div class="flex items-center gap-2">
          <button
            (click)="prev()"
            [disabled]="!canPrev()"
            class="btn-secondary h-8 px-3 text-[11.5px] font-bold flex items-center justify-center disabled:opacity-40 shrink-0 cursor-pointer"
          >
            <svg class="h-3 w-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            Prev
          </button>
          <span class="text-[11.5px] font-bold text-slate-600 px-1">Page {{ pageNo() }} / {{ totalPages() }}</span>
          <button
            (click)="next()"
            [disabled]="!canNext()"
            class="btn-secondary h-8 px-3 text-[11.5px] font-bold flex items-center justify-center disabled:opacity-40 shrink-0 cursor-pointer"
          >
            Next
            <svg class="h-3 w-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  }

  <!-- Refund tab -->
  @if (isRefund()) {
    <div class="flex-1 flex flex-col min-h-0 gap-4">
      <app-data-table
        [columns]="refundColumns"
        [rows]="refundRows()"
        [loading]="loading()"
        [searchable]="false"
        emptyText="No refund requests."
        [actions]="refundActions"
        [fillHeight]="true"
      />
      <ng-template #refundActions let-row>
        <button (click)="approveRefund(row)"
                (mouseenter)="tooltip.show($event, 'Approve Refund', { info: 'Approve refund request and update transaction ledger.', placement: 'left' })"
                (mouseleave)="tooltip.hide()"
                class="flex h-7.5 w-7.5 items-center justify-center rounded-lg text-emerald-600 hover:bg-emerald-50 border border-slate-200/40 hover:border-emerald-200/50 bg-white shadow-2xs hover:shadow-xs transition-all cursor-pointer"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </button>
      </ng-template>
    </div>
  }

  <!-- Return tab -->
  @if (isReturn()) {
    <div class="flex-1 flex flex-col min-h-0 gap-4">
      <app-data-table
        [columns]="returnColumns"
        [rows]="returnRows()"
        [loading]="loading()"
        [searchable]="false"
        emptyText="No return requests."
        [actions]="returnActions"
        [fillHeight]="true"
      />
      <ng-template #returnActions let-row>
        <button (click)="approveReturn(row)"
                (mouseenter)="tooltip.show($event, 'Approve Return', { info: 'Approve item returns and schedule return pickup.', placement: 'left' })"
                (mouseleave)="tooltip.hide()"
                class="flex h-7.5 w-7.5 items-center justify-center rounded-lg text-emerald-600 hover:bg-emerald-50 border border-slate-200/40 hover:border-emerald-200/50 bg-white shadow-2xs hover:shadow-xs transition-all cursor-pointer"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </button>
      </ng-template>
    </div>
  }
</div>
