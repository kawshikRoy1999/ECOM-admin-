<div class="flex min-h-screen bg-slate-50">
  <!-- Sidebar -->
  <aside
    class="hidden flex-col border-r border-slate-200 bg-white transition-all lg:flex"
    [class.w-64]="sidebarOpen()"
    [class.w-0]="!sidebarOpen()"
    [class.overflow-hidden]="!sidebarOpen()"
  >
    <div class="flex h-16 items-center gap-3 border-b border-slate-200 px-6">
      <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-brand-600 text-sm font-bold text-white">E</span>
      <span class="font-semibold text-slate-900">ECOM Admin</span>
    </div>

    <nav class="flex-1 overflow-y-auto px-3 py-4">
      @for (group of nav; track group.group) {
        <p class="px-3 pb-1 pt-3 text-xs font-semibold uppercase tracking-wide text-slate-400">
          {{ group.group }}
        </p>
        @for (item of group.items; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-brand-50 text-brand-700"
            class="mb-0.5 flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
          >
            <span class="text-slate-400">{{ item.icon }}</span>
            {{ item.label }}
          </a>
        }
      }
    </nav>
  </aside>

  <!-- Main -->
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-16 items-center justify-between border-b border-slate-200 bg-white px-6">
      <button (click)="toggleSidebar()" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100" aria-label="Toggle menu">
        ☰
      </button>
      <div class="flex items-center gap-3">
        <span class="text-sm text-slate-600">{{ displayName() }}</span>
        <button
          (click)="logout()"
          class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50"
        >
          Log out
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>
  </div>
</div>
