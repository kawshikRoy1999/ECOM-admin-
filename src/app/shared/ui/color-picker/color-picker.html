<div class="relative w-full select-none" (click)="$event.stopPropagation()">
  @if (label()) {
    <label class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest block mb-1.5">{{ label() }}</label>
  }

  <div class="relative flex items-center w-full gap-2">
    <!-- Visual Circle Swatch Button -->
    <button
      type="button"
      (click)="toggleDropdown()"
      [disabled]="disabled"
      class="h-9 w-9 rounded-full border border-slate-200/80 cursor-pointer shrink-0 relative overflow-hidden transition-all duration-300 hover:scale-105 active:scale-95 shadow-sm hover:shadow-md focus:outline-none flex items-center justify-center"
      [class.opacity-50]="disabled"
      [class.pointer-events-none]="disabled"
    >
      <div class="h-full w-full transition-colors duration-300" [style.backgroundColor]="value()"></div>
      <!-- Subtle reflection glass overlay for premium feel -->
      <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-white/25 pointer-events-none"></div>
    </button>

    <!-- Color Code Input and Chevron -->
    @if (showInput()) {
      <div class="relative flex-1">
        <input
          type="text"
          [value]="value()"
          (input)="onTextChange($any($event.target).value)"
          [disabled]="disabled"
          placeholder="{{ placeholder() }}"
          class="w-full h-9 pl-3.5 pr-8 border border-slate-200 rounded-xl bg-slate-50/60 hover:bg-slate-50 focus:bg-white focus:border-brand-600 focus:outline-none focus:ring-4 focus:ring-brand-500/10 transition-all text-[12.5px] uppercase font-mono text-slate-700 font-semibold tracking-wider"
        />
        <!-- Chevron Down toggle -->
        <button
          type="button"
          (click)="toggleDropdown()"
          [disabled]="disabled"
          class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none cursor-pointer transition-transform duration-300"
          [class.rotate-180]="isOpen()"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
      </div>
    }
  </div>

  <!-- Dropdown Panel (Glassmorphism design) -->
  @if (isOpen() && !disabled) {
    <div class="absolute z-50 mt-2 w-60 bg-white/95 backdrop-blur-xl border border-slate-200/50 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.12)] p-3.5 select-none animate-fadeIn"
      [class.right-0]="align() === 'right'"
      [class.left-0]="align() === 'left'"
    >
      <!-- Section Header -->
      <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2.5 flex items-center justify-between">
        <span>Theme Swatches</span>
      </div>

      <!-- Presets Grid -->
      <div class="grid grid-cols-4 gap-2.5">
        @for (preset of presets; track preset.hex) {
          <button
            type="button"
            (click)="selectColor(preset.hex)"
            class="group h-8.5 w-8.5 rounded-full border border-slate-200/50 transition-all duration-300 hover:scale-110 active:scale-95 focus:outline-none relative shadow-sm hover:shadow flex items-center justify-center cursor-pointer overflow-hidden"
            [title]="preset.name"
          >
            <div class="absolute inset-0 transition-transform duration-300 group-hover:scale-105" [style.backgroundColor]="preset.hex"></div>
            <!-- Inner gloss -->
            <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-white/15 pointer-events-none"></div>
            
            @if (value().toLowerCase() === preset.hex.toLowerCase()) {
              <div class="absolute inset-0 flex items-center justify-center bg-black/10 transition-opacity">
                <svg 
                  class="h-4.5 w-4.5 drop-shadow-sm animate-scaleIn" 
                  [class.text-white]="preset.hex.toLowerCase() !== '#ffffff'" 
                  [class.text-slate-800]="preset.hex.toLowerCase() === '#ffffff'"
                  fill="none" 
                  stroke="currentColor" 
                  viewBox="0 0 24 24" 
                  stroke-width="3"
                >
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
              </div>
            }
          </button>
        }
      </div>

      <!-- Divider -->
      <div class="h-px bg-slate-100/80 my-3"></div>

      <!-- Text input inside dropdown when showInput is false -->
      @if (!showInput()) {
        <div class="mb-3">
          <input
            type="text"
            [value]="value()"
            (input)="onTextChange($any($event.target).value)"
            placeholder="{{ placeholder() }}"
            class="w-full h-8.5 px-3 border border-slate-200 rounded-xl focus:border-brand-600 focus:outline-none focus:ring-4 focus:ring-brand-500/10 text-[12px] uppercase font-mono text-slate-700 font-semibold tracking-wider bg-slate-50/50"
          />
        </div>
      }

      <!-- Custom Color Option Triggering Native Picker -->
      <label class="w-full h-8.5 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-slate-50 hover:border-slate-200/80 transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer text-[12px] font-bold text-slate-600 relative overflow-hidden group select-none">
        <div class="h-4 w-4 rounded-full bg-gradient-to-tr from-red-500 via-green-500 to-blue-500 shadow-sm shrink-0 transition-transform group-hover:rotate-45 duration-500"></div>
        <span>Custom Color</span>
        <input
          type="color"
          [value]="value()"
          (input)="onNativePicker($event)"
          class="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
        />
      </label>
    </div>
  }
</div>
